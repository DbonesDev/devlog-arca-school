<!DOCTYPE html>
<html lang="{{ config.default_language }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ config.title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}{{ config.description }}{% endblock %}">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="{{ get_url(path='style.css') }}">

  <!-- Feeds -->
  {% if config.generate_feeds %}
  <link rel="alternate" type="application/atom+xml" title="Atom Feed" href="{{ get_url(path='atom.xml') }}">
  {% endif %}

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">📜</text></svg>'>

  {% block head_extra %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="{{ config.base_url }}" class="site-logo">
        <span class="logo-mark">A</span>
        DevLog
      </a>
      <nav>
        <a href="{{ get_url(path='@/blog/_index.md') }}" {% if current_path is starting_with("/blog") %}class="active"{% endif %}>Posts</a>
        <a href="{{ get_url(path='@/about.md') }}" {% if current_path is starting_with("/about") %}class="active"{% endif %}>About</a>
        <a href="{{ config.extra.github }}" target="_blank" rel="noopener">GitHub</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="{{ get_url(path='atom.xml') }}">RSS</a>
        <a href="{{ config.extra.github }}" target="_blank" rel="noopener">GitHub</a>
        <a href="https://arca.school" target="_blank" rel="noopener">Arca School</a>
      </div>
      <p>&copy; {{ now() | date(format="%Y") }} {{ config.extra.author }}. Built with classical intention.</p>
    </div>
  </footer>
</body>
</html>
